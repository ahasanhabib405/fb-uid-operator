<!DOCTYPE html>
<html>
<head><title>FB UID Operator</title>
<style>
body{background:#f0f2f5;padding:20px;font-family:sans-serif}
.container{max-width:950px;margin:auto;background:white;padding:25px;border-radius:16px}
.header{text-align:center;border-bottom:2px solid #e4e6eb;padding-bottom:15px}
.header h1{color:#1877f2}
.btn{padding:12px 30px;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.btn-import{background:#8b5cf6;color:white}
.btn-danger{background:#e41e3f;color:white}
.account-card{background:#f7f8fa;border:1px solid #e4e6eb;border-radius:12px;padding:15px;margin:10px 0;display:flex;align-items:center;gap:15px;flex-wrap:wrap}
.account-card .avatar{width:50px;height:50px;border-radius:50%;overflow:hidden;border:2px solid #8b5cf6}
.account-card .avatar img{width:100%;height:100%}
.account-card .info{flex:1}
.account-card .info .name{font-weight:700}
.account-card .info .uid{color:#1877f2;cursor:pointer}
.credit-link{text-align:center;margin-top:10px;padding:10px;background:#f0f2ff;border-radius:12px}
.credit-link a{color:#1877f2;text-decoration:none;font-weight:700;font-size:18px}
textarea{width:100%;height:120px;padding:10px;border:2px solid #ddd;border-radius:10px;margin:10px 0}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.stats{display:flex;gap:15px;margin:15px 0}
.stat-box{flex:1;background:#f7f8fa;padding:12px;border-radius:10px;text-align:center}
.stat-box .number{font-size:26px;font-weight:700;color:#1877f2}
.toast{position:fixed;bottom:20px;right:20px;background:#1c1e21;color:white;padding:14px 28px;border-radius:12px;display:none}
.toast.show{display:block}
.toast.success{background:#42b72a}
.toast.error{background:#e41e3f}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>📱 UID Operator <span style="background:#8b5cf6;color:white;padding:2px 14px;border-radius:20px;font-size:14px;">Unlimited</span></h1>
<p>যেকোনো UID পেস্ট করুন</p>
<div class="credit-link"><a href="#" onclick="event.preventDefault();alert('আমার কাছে কোনো তথ্য নেই 😊');">👤 Ahasan Habib</a></div>
</div>
<div class="stats"><div class="stat-box"><div class="number" id="totalCount">0</div><div>মোট</div></div>
<div class="stat-box"><div class="number" id="activeCount">0</div><div>সক্রিয়</div></div></div>
<textarea id="uidInput" placeholder="UID|পাসওয়ার্ড&#10;100068725368602|836899"></textarea>
<div class="buttons">
<button class="btn btn-import" onclick="importData()">📥 ইম্পোর্ট করুন</button>
<button class="btn btn-import" onclick="loadSample()" style="background:#42b72a;">📥 নমুনা লোড</button>
<button class="btn btn-danger" onclick="clearAll()">🗑️ সব মুছুন</button>
</div>
<div id="accountContainer"><div style="text-align:center;padding:40px;color:#65676b;">📭 কোনো অ্যাকাউন্ট নেই</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
let accounts=[];
function loadData(){try{const s=localStorage.getItem('fbAccounts');if(s){accounts=JSON.parse(s)}}catch(e){}render()}
function saveData(){localStorage.setItem('fbAccounts',JSON.stringify(accounts));render()}
function showToast(m,t='success'){const o=document.getElementById('toast');o.textContent=m;o.className='toast show '+t;clearTimeout(o._timeout);o._timeout=setTimeout(()=>o.classList.remove('show'),3000)}
async function fetchProfile(uid){try{const r=await fetch(`https://graph.facebook.com/${uid}?fields=name`);if(r.ok){const d=await r.json();return{name:d.name||'User',picture:`https://graph.facebook.com/${uid}/picture?type=large`}}}catch(e){}return{name:'User',picture:`https://graph.facebook.com/${uid}/picture?type=large`}}
async function importData(){const input=document.getElementById('uidInput').value.trim();if(!input){showToast('❌ ইনপুট দিন!','error');return}
const lines=input.split('\n').filter(l=>l.trim());let added=0;for(const line of lines){let uid,pass;if(line.includes('|')){[uid,pass]=line.split('|').map(s=>s.trim())}else if(line.includes(',')){[uid,pass]=line.split(',').map(s=>s.trim())}else continue;if(uid&&pass&&!accounts.some(a=>a.uid===uid)){const p=await fetchProfile(uid);accounts.push({uid,password:pass,name:p.name,picture:p.picture});added++}}
if(added>0){saveData();document.getElementById('uidInput').value='';showToast(`✅ ${added} টি যোগ হয়েছে!`)}else{showToast('⚠️ নতুন কিছু যোগ হয়নি','error')}}
function loadSample(){const s=[{uid:'100068725368602',password:'836899',name:'Md Sayful Islam',picture:'https://graph.facebook.com/100068725368602/picture?type=large'},{uid:'100070825654360',password:'936505',name:'Md Mohibbullah',picture:'https://graph.facebook.com/100070825654360/picture?type=large'}];let a=0;s.forEach(d=>{if(!accounts.some(x=>x.uid===d.uid)){accounts.push({...d});a++}});saveData();showToast(`✅ ${a} টি নমুনা লোড!`)}
function clearAll(){if(accounts.length===0){showToast('📭 খালি!','error');return}if(confirm('সব মুছবেন?')){accounts=[];saveData();showToast('🗑️ মুছে ফেলা হয়েছে!')}}
function deleteAccount(i){if(confirm(`"${accounts[i].name}" ডিলিট?`)){accounts.splice(i,1);saveData();showToast('🗑️ ডিলিট!')}}
function copyUID(uid,b){navigator.clipboard.writeText(uid);showToast('✅ UID কপি!');b.textContent='✅';setTimeout(()=>b.textContent='📋 UID',1000)}
function copyPass(pass,b){navigator.clipboard.writeText(pass);showToast('✅ PASS কপি!');b.textContent='✅';setTimeout(()=>b.textContent='🔑 PASS',1000)}
function openProfile(uid){window.open(`https://facebook.com/${uid}`,'_blank')}
function render(){const c=document.getElementById('accountContainer');document.getElementById('totalCount').textContent=accounts.length;document.getElementById('activeCount').textContent=accounts.length;if(accounts.length===0){c.innerHTML='<div style="text-align:center;padding:40px;color:#65676b;">📭 কোনো অ্যাকাউন্ট নেই</div>';return}
let h='';accounts.forEach((a,i)=>{const init=a.name?a.name.charAt(0).toUpperCase():'?';h+=`<div class="account-card"><div class="avatar"><img src="${a.picture}" onerror="this.parentElement.textContent='${init}'"></div><div class="info"><div class="name">${a.name}</div><div><span class="uid" onclick="openProfile('${a.uid}')">🆔 ${a.uid}</span> | <span style="color:#e41e3f;">🔑 ${a.password}</span></div></div><div><button style="background:#3b82f6;color:white;padding:4px 12px;border:none;border-radius:6px;cursor:pointer;" onclick="copyUID('${a.uid}',this)">📋 UID</button> <button style="background:#f59e0b;color:white;padding:4px 12px;border:none;border-radius:6px;cursor:pointer;" onclick="copyPass('${a.password}',this)">🔑 PASS</button> <button style="background:#e41e3f;color:white;padding:4px 12px;border:none;border-radius:6px;cursor:pointer;" onclick="deleteAccount(${i})">🗑️</button></div></div>`});c.innerHTML=h}
loadData();
</script>
</body>
</html>
