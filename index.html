<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>OPERATOR</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
        body{background:#0a0a0f;color:#fff;padding:16px;min-height:100vh}
        .container{max-width:500px;margin:auto}
        /* Header */
        .header{display:flex;justify-content:space-between;align-items:center;padding:12px 0 16px;border-bottom:1px solid #1a1a2e}
        .header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#8b5cf6,#1877f2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header .badge{background:#1877f2;color:#fff;font-size:10px;padding:2px 10px;border-radius:20px;font-weight:600}
        /* Search */
        .search-box{background:#1a1a2e;border-radius:12px;padding:12px 16px;margin:16px 0;display:flex;align-items:center;gap:10px;border:1px solid #2a2a3e}
        .search-box input{background:transparent;border:none;color:#fff;font-size:14px;width:100%;outline:none}
        .search-box input::placeholder{color:#65676b}
        .search-box .icon{color:#65676b;font-size:18px}
        /* Stats */
        .stats{display:flex;gap:10px;margin:16px 0}
        .stat-box{flex:1;background:#1a1a2e;padding:12px;border-radius:12px;text-align:center;border:1px solid #2a2a3e}
        .stat-box .number{font-size:22px;font-weight:700;color:#8b5cf6}
        .stat-box .label{font-size:11px;color:#65676b;margin-top:2px}
        /* Account Card */
        .account-card{background:#1a1a2e;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #2a2a3e;transition:0.3s;position:relative}
        .account-card:hover{border-color:#8b5cf6;box-shadow:0 0 20px rgba(139,92,246,0.1)}
        .account-card .top{display:flex;align-items:center;gap:14px}
        .account-card .avatar{width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid #8b5cf6;flex-shrink:0;background:#2a2a3e;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}
        .account-card .avatar img{width:100%;height:100%;object-fit:cover}
        .account-card .info{flex:1}
        .account-card .info .name{font-weight:700;font-size:16px;color:#fff}
        .account-card .info .uid{color:#65676b;font-size:12px;font-family:monospace;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
        .account-card .info .uid:hover{color:#8b5cf6}
        .account-card .info .ig{color:#8b5cf6;font-size:12px;font-weight:600}
        .account-card .status{display:inline-flex;align-items:center;gap:4px;background:#42b72a20;color:#42b72a;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;border:1px solid #42b72a40}
        .account-card .status.inactive{background:#e41e3f20;color:#e41e3f;border-color:#e41e3f40}
        .account-card .pass-row{display:flex;align-items:center;gap:8px;margin-top:8px;background:#0a0a0f;padding:6px 12px;border-radius:8px;border:1px solid #2a2a3e}
        .account-card .pass-row .pass{color:#e41e3f;font-family:monospace;font-size:13px;flex:1}
        .account-card .pass-row .locked{color:#65676b;font-size:16px;cursor:pointer}
        .account-card .actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
        .account-card .actions button{background:#2a2a3e;border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:4px}
        .account-card .actions button:hover{background:#8b5cf6;color:#fff}
        .account-card .actions .del-btn{background:#2a2a3e;color:#e41e3f}
        .account-card .actions .del-btn:hover{background:#e41e3f;color:#fff}
        .account-card .actions .fav-btn{background:#2a2a3e;color:#f59e0b}
        .account-card .actions .fav-btn:hover{background:#f59e0b;color:#fff}
        .account-card .actions .fav-btn.active{background:#f59e0b;color:#fff}
        .account-card .badge-fav{position:absolute;top:12px;right:12px;color:#f59e0b;font-size:18px}
        /* Buttons */
        .btn-group{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
        .btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;transition:0.2s;min-width:80px;text-align:center}
        .btn-primary{background:#8b5cf6;color:#fff}
        .btn-primary:hover{background:#7c3aed}
        .btn-success{background:#42b72a;color:#fff}
        .btn-success:hover{background:#36a420}
        .btn-danger{background:#e41e3f;color:#fff}
        .btn-danger:hover{background:#c91b36}
        .btn-outline{background:transparent;border:1px solid #2a2a3e;color:#fff}
        .btn-outline:hover{background:#2a2a3e}
        .btn-export{background:#f59e0b;color:#fff}
        .btn-export:hover{background:#d97706}
        /* Textarea */
        textarea{width:100%;height:100px;padding:12px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:12px;color:#fff;font-family:monospace;font-size:13px;resize:vertical;outline:none;transition:0.2s}
        textarea:focus{border-color:#8b5cf6}
        .import-area{background:#1a1a2e;border-radius:16px;padding:16px;border:1px solid #2a2a3e;margin:12px 0}
        .import-area label{font-weight:600;font-size:14px;color:#8b5cf6;display:block;margin-bottom:6px}
        .hint{color:#65676b;font-size:12px;margin-top:6px}
        .empty-state{text-align:center;padding:50px 20px;color:#65676b}
        .empty-state .icon{font-size:50px;margin-bottom:10px}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;border:1px solid #2a2a3e;display:none;z-index:999;max-width:90%;text-align:center}
        .toast.show{display:block;animation:slideUp 0.3s}
        .toast.success{border-color:#42b72a;color:#42b72a}
        .toast.error{border-color:#e41e3f;color:#e41e3f}
        @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .fade-in{animation:fadeIn 0.3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:480px){.container{padding:0}.header h1{font-size:20px}.btn{font-size:13px;padding:10px}.account-card{padding:14px}}
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>📱 OPERATOR <span class="badge">v2.0</span></h1>
        <div style="display:flex;gap:8px;align-items:center">
            <span style="color:#65676b;font-size:12px" id="totalBadge">0</span>
        </div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="UID বা নাম দিয়ে খুঁজুন..." oninput="filterAccounts()">
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-box"><div class="number" id="totalCount">0</div><div class="label">📊 মোট</div></div>
        <div class="stat-box"><div class="number" id="activeCount">0</div><div class="label">✅ সক্রিয়</div></div>
        <div class="stat-box"><div class="number" id="favCount">0</div><div class="label">⭐ ফেভারিট</div></div>
    </div>

    <!-- Import Area -->
    <div class="import-area">
        <label>📥 UID & পাসওয়ার্ড ইম্পোর্ট করুন</label>
        <textarea id="uidInput" placeholder="UID|পাসওয়ার্ড&#10;100068725368602|836899"></textarea>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="importData()">📥 ইম্পোর্ট</button>
            <button class="btn btn-success" onclick="loadSample()">📥 নমুনা</button>
            <button class="btn btn-export" onclick="exportData()">📤 এক্সপোর্ট</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ মুছুন</button>
        </div>
        <div class="hint">💡 প্রতিটি লাইনে একটি UID|পাসওয়ার্ড দিন</div>
    </div>

    <!-- Account List -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px">
        <h3 style="font-size:16px;color:#fff">👥 অ্যাকাউন্ট লিস্ট</h3>
        <span style="color:#65676b;font-size:13px" id="listCount">0 টি</span>
    </div>
    <div id="accountContainer">
        <div class="empty-state"><div class="icon">📭</div><h3>কোনো অ্যাকাউন্ট নেই</h3><p>উপরের বক্সে UID পেস্ট করুন</p></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let accounts = [];
let showPasswords = {};
let favorites = new Set();

function loadData(){
    try{
        const saved = localStorage.getItem('operatorAccounts');
        if(saved){accounts = JSON.parse(saved)}
        const fav = localStorage.getItem('operatorFavorites');
        if(fav){favorites = new Set(JSON.parse(fav))}
    }catch(e){}
    render();
}

function saveData(){
    localStorage.setItem('operatorAccounts', JSON.stringify(accounts));
    localStorage.setItem('operatorFavorites', JSON.stringify([...favorites]));
    render();
}

function showToast(msg, type='success'){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show '+type;
    clearTimeout(t._timeout);
    t._timeout = setTimeout(()=>t.classList.remove('show'), 2500);
}

async function fetchProfile(uid){
    try{
        const r = await fetch(`https://graph.facebook.com/${uid}?fields=name,username`);
        if(r.ok){
            const d = await r.json();
            return {name: d.name || `User_${uid.slice(-6)}`, username: d.username || '', picture: `https://graph.facebook.com/${uid}/picture?type=large`};
        }
    }catch(e){}
    return {name: `User_${uid.slice(-6)}`, username: '', picture: `https://graph.facebook.com/${uid}/picture?type=large`};
}

async function importData(){
    const input = document.getElementById('uidInput').value.trim();
    if(!input){showToast('❌ ইনপুট দিন!','error');return;}
    const lines = input.split('\n').filter(l=>l.trim());
    let added = 0;
    for(const line of lines){
        let uid, pass;
        if(line.includes('|')){[uid, pass] = line.split('|').map(s=>s.trim());}
        else if(line.includes(',')){[uid, pass] = line.split(',').map(s=>s.trim());}
        else continue;
        if(uid && pass && !accounts.some(a=>a.uid===uid)){
            const profile = await fetchProfile(uid);
            accounts.push({uid, password: pass, name: profile.name, username: profile.username, picture: profile.picture, active: true, fav: false});
            added++;
        }
    }
    if(added>0){saveData();document.getElementById('uidInput').value='';showToast(`✅ ${added} টি যোগ হয়েছে!`);}
    else{showToast('⚠️ নতুন কিছু যোগ হয়নি','error');}
}

function loadSample(){
    const sample = [
        {uid:'100068725368602', password:'836899', name:'Jihat Hossain', username:'jihat_hossain', picture:'https://graph.facebook.com/100068725368602/picture?type=large'},
        {uid:'100094337376611', password:'123456', name:'Aziz Khan', username:'aziz.khan.272494', picture:'https://graph.facebook.com/100094337376611/picture?type=large'},
        {uid:'100093616231930', password:'654321', name:'Md Khairul', username:'', picture:'https://graph.facebook.com/100093616231930/picture?type=large'},
        {uid:'100090506105055', password:'987654', name:'Prince Nazmul', username:'prince.nazmul.896282', picture:'https://graph.facebook.com/100090506105055/picture?type=large'},
        {uid:'100090693261101', password:'111222', name:'MD Majarul', username:'', picture:'https://graph.facebook.com/100090693261101/picture?type=large'}
    ];
    let added=0;
    sample.forEach(d=>{if(!accounts.some(a=>a.uid===d.uid)){accounts.push({...d, active:true, fav:false}); added++;}});
    saveData();
    showToast(`✅ ${added} টি নমুনা লোড!`);
}

function exportData(){
    if(accounts.length===0){showToast('📭 কিছু নেই!','error');return;}
    let text = accounts.map(a=>`${a.uid}|${a.password}`).join('\n');
    navigator.clipboard.writeText(text).then(()=>showToast(`📤 ${accounts.length} টি কপি!`)).catch(()=>{document.getElementById('uidInput').value=text;document.getElementById('uidInput').select();document.execCommand('copy');showToast('📤 কপি!');});
}

function clearAll(){
    if(accounts.length===0){showToast('📭 খালি!','error');return;}
    if(confirm('সব মুছবেন?')){accounts=[];favorites.clear();saveData();showToast('🗑️ মুছে ফেলা!');}
}

function deleteAccount(index){
    if(confirm(`"${accounts[index].name}" ডিলিট?`)){accounts.splice(index,1);saveData();showToast('🗑️ ডিলিট!');}
}

function toggleFav(index){
    const uid = accounts[index].uid;
    if(favorites.has(uid)){favorites.delete(uid);}else{favorites.add(uid);}
    accounts[index].fav = favorites.has(uid);
    saveData();
}

function togglePass(index){
    const uid = accounts[index].uid;
    showPasswords[uid] = !showPasswords[uid];
    render();
}

function copyUID(uid, btn){
    navigator.clipboard.writeText(uid).then(()=>{showToast('✅ UID কপি!');btn.textContent='✅';setTimeout(()=>btn.textContent='📋 UID',1000);}).catch(()=>{const ta=document.createElement('textarea');ta.value=uid;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast('✅ UID কপি!');btn.textContent='✅';setTimeout(()=>btn.textContent='📋 UID',1000);});
}

function copyPass(pass, btn){
    navigator.clipboard.writeText(pass).then(()=>{showToast('✅ PASS কপি!');btn.textContent='✅';setTimeout(()=>btn.textContent='🔑 PASS',1000);}).catch(()=>{const ta=document.createElement('textarea');ta.value=pass;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showToast('✅ PASS কপি!');btn.textContent='✅';setTimeout(()=>btn.textContent='🔑 PASS',1000);});
}

function openProfile(uid){window.open(`https://facebook.com/${uid}`,'_blank');}

function filterAccounts(){
    const query = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.account-card');
    cards.forEach(card=>{
        const name = card.dataset.name?.toLowerCase() || '';
        const uid = card.dataset.uid || '';
        card.style.display = (name.includes(query) || uid.includes(query)) ? 'block' : 'none';
    });
}

function render(){
    const container = document.getElementById('accountContainer');
    document.getElementById('totalCount').textContent = accounts.length;
    document.getElementById('activeCount').textContent = accounts.filter(a=>a.active!==false).length;
    document.getElementById('favCount').textContent = favorites.size;
    document.getElementById('listCount').textContent = accounts.length+' টি';
    document.getElementById('totalBadge').textContent = accounts.length;

    if(accounts.length===0){
        container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>কোনো অ্যাকাউন্ট নেই</h3><p>উপরের বক্সে UID পেস্ট করুন</p></div>';
        return;
    }

    let html = '';
    accounts.forEach((acc, i)=>{
        const isFav = favorites.has(acc.uid);
        const showPass = showPasswords[acc.uid] || false;
        const initial = acc.name ? acc.name.charAt(0).toUpperCase() : '?';
        const igDisplay = acc.username ? `@${acc.username}` : '';
        const passDisplay = showPass ? acc.password : '•'.repeat(Math.min(acc.password.length, 8));
        html += `
            <div class="account-card fade-in" data-name="${acc.name.toLowerCase()}" data-uid="${acc.uid}">
                ${isFav ? '<div class="badge-fav">⭐</div>' : ''}
                <div class="top">
                    <div class="avatar">
                        <img src="${acc.picture}" onerror="this.parentElement.textContent='${initial}'">
                    </div>
                    <div class="info">
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                            <span class="name">${acc.name}</span>
                            <span class="status ${acc.active===false?'inactive':''}">${acc.active!==false?'🟢 ACTIVE':'🔴 INACTIVE'}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                            <span class="uid" onclick="openProfile('${acc.uid}')">🆔 ${acc.uid}</span>
                            ${igDisplay ? `<span class="ig">📷 ${igDisplay}</span>` : ''}
                        </div>
                    </div>
                </div>
                <div class="pass-row">
                    <span class="pass">🔑 ${passDisplay}</span>
                    <span class="locked" onclick="togglePass(${i})">${showPass ? '🔓' : '🔒'}</span>
                </div>
                <div class="actions">
                    <button onclick="copyUID('${acc.uid}', this)">📋 UID</button>
                    <button onclick="copyPass('${acc.password}', this)">🔑 PASS</button>
                    <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav(${i})">${isFav?'⭐':'☆'}</button>
                    <button class="del-btn" onclick="deleteAccount(${i})">🗑️</button>
                </div>
            </div>
        `;
    });
    container.innerHTML = html;
}

loadData();
</script>

</body>
</html>
